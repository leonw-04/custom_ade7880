# ESPHome Configuration: ADE7880 3-Phase Energy Meter with Calibration
#
# HARDWARE WIRING (ESP32 to ADE7880):
#   ESP32 GPIO21 (SDA) -----> ADE7880 SDA (I2C)
#   ESP32 GPIO22 (SCL) -----> ADE7880 SCL (I2C)
#   ESP32 GND -----------> ADE7880 GND
#   ESP32 3.3V (optional) -> ADE7880 VDD_IO
#
# I2C ADDRESS:
#   - 0x38 (default, used here)
#   - 0x39 (if configured differently)
#
# CALIBRATION SERVICES (in Home Assistant):
#   - ade7880.calibrate_voltage(phase: "A"|"B"|"C", target_voltage: float)
#   - ade7880.calibrate_current(phase: "A"|"B"|"C", target_current: float)
#   - ade7880.calibrate_power(phase: "A"|"B"|"C", target_power: float)
#   - ade7880.reset_calibration()

esphome:
  name: ade7880-energy-meter
  friendly_name: "ADE7880 3-Phase Energy Meter"
  platform: ESP32
  board: esp32dev

# WiFi Configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: light

# Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

# OTA Updates
ota:
  password: !secret ota_password

# Logging
logger:
  level: DEBUG
  logs:
    ade7880: DEBUG
    i2c: DEBUG

# I2C Bus Configuration
i2c:
  id: bus_a
  sda: GPIO21
  scl: GPIO22
  frequency: 100kHz  # Conservative frequency for reliability
  scan: true

# External Component: ADE7880 with Calibration
external_components:
  - source:
      type: local
      path: ./custom_components/ade7880
    components: [ade7880]

# Sensors from ADE7880 (all sensors are optional)
sensor:
  - platform: ade7880
    i2c_id: bus_a
    address: 0x38
    update_interval: 60s  # Read every 60 seconds

    # Phase A
    voltage_a:
      name: "Phase A Voltage"
      icon: mdi:lightning-bolt
    current_a:
      name: "Phase A Current"
      icon: mdi:current-ac
    power_a:
      name: "Phase A Active Power"
      icon: mdi:power

    # Phase B
    voltage_b:
      name: "Phase B Voltage"
      icon: mdi:lightning-bolt
    current_b:
      name: "Phase B Current"
      icon: mdi:current-ac
    power_b:
      name: "Phase B Active Power"
      icon: mdi:power

    # Phase C
    voltage_c:
      name: "Phase C Voltage"
      icon: mdi:lightning-bolt
    current_c:
      name: "Phase C Current"
      icon: mdi:current-ac
    power_c:
      name: "Phase C Active Power"
      icon: mdi:power

# ============================================================================
# CALIBRATION WORKFLOW
# ============================================================================
#
# The ADE7880 component exposes the following services via Home Assistant:
#
# 1. calibrate_voltage(phase: string, target_voltage: float)
#    Example: Call with phase="A" and target_voltage=230.0
#    This service:
#    - Reads the current (uncalibrated) VRMS value from the register
#    - Calculates the gain correction: gain = ((target / measured) - 1) * 2^23
#    - Writes the gain to the device's AVGAIN/BVGAIN/CVGAIN register
#    - Saves the gain value to Flash storage
#
# 2. calibrate_current(phase: string, target_current: float)
#    Example: Call with phase="A" and target_current=10.5
#    Similar to voltage calibration but for IRMS registers (AIGAIN/BIGAIN/CIGAIN)
#
# 3. calibrate_power(phase: string, target_power: float)
#    Example: Call with phase="A" and target_power=2300.0
#    Similar to above but for active power (WATT registers and PGAIN registers)
#
# 4. reset_calibration()
#    Resets all 9 gain registers (3 phases × 3 types) to 0x000000
#    Clears Flash storage
#
# ============================================================================
# CALIBRATION PROCEDURE
# ============================================================================
#
# Prerequisites:
#   - Reference measurement device (multimeter, clamp meter, power analyzer)
#   - Known load (resistive for power calibration)
#   - Device must be powered and measuring for at least 10 seconds
#
# Steps for Voltage Calibration (example for Phase A):
#   1. Connect a reference voltmeter to Phase A (line-to-neutral or line-to-line)
#   2. Note the reference voltage (e.g., 230.5 V)
#   3. In Home Assistant, call service:
#      service: ade7880.calibrate_voltage
#      data:
#        phase: "A"
#        target_voltage: 230.5
#   4. The component calculates and applies the gain correction
#   5. Monitor logs for confirmation
#   6. The calibration is persisted to Flash
#
# Steps for Current Calibration (example for Phase A):
#   1. Connect a calibrated clamp meter to the Phase A wire
#   2. Note the reference current (e.g., 10.2 A)
#   3. Call service:
#      service: ade7880.calibrate_current
#      data:
#        phase: "A"
#        target_current: 10.2
#   4. The component applies the correction and saves to Flash
#
# Steps for Power Calibration:
#   1. Connect a known resistive load to Phase A (e.g., 2 kW heater)
#   2. Use a reference meter to confirm power (e.g., 1987 W)
#   3. Call service:
#      service: ade7880.calibrate_power
#      data:
#        phase: "A"
#        target_power: 1987
#   4. The component applies the correction
#
# To Reset Calibration (return to defaults):
#   Call service:
#     service: ade7880.reset_calibration
#
# ============================================================================
# TECHNICAL NOTES
# ============================================================================
#
# 1. Calibration Formula:
#    New Measurement = Raw Measurement × (1 + Gain_Register / 2^23)
#    Where: Gain_Register = ((Target / Measured) - 1) × 2^23
#
# 2. Register Format:
#    - Gain registers (0x43XX) are 24-bit signed values (two's complement)
#    - Transmitted as 32-bit over I2C (Big-Endian)
#    - Valid range: -0x800000 to +0x7FFFFF
#    - Stored persistently in Flash via ESPPreferences
#
# 3. RMS Value Scaling:
#    - Voltage RMS: Raw value × 0.001 = Volts
#    - Current RMS: Raw value × 0.0001 = Amperes
#    - Power: Raw value × 0.01 = Watts (after sign extension)
#
# 4. Measurement Accuracy:
#    - Ensure stable input signals for at least 10-20 seconds before calibration
#    - Reference devices should have ±1% accuracy or better
#    - Perform voltage and current calibration first, then power calibration
#
# 5. Multiple Calibrations:
#    - Each phase can be calibrated independently
#    - Voltage, current, and power calibrations are separate
#    - Later calibrations overwrite earlier ones (save old values if needed)
#
# 6. Flash Storage:
#    - Calibration data uses ESPPreferences with CRC protection
#    - Survives device reboots and OTA updates
#    - Applied automatically on startup (within 1 second)
#
# ============================================================================
